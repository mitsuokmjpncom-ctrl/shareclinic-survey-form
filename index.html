<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カウンセリングシート</title>
<style>
:root {
  --line-green: #06C755;
  --line-green-dark: #04A847;
  --line-green-light: #E8F8EE;
  --bg: #ECEFF1;
  --card: #FFFFFF;
  --text: #1C2024;
  --mute: #6F7682;
  --border: #E1E4E8;
  --accent: #128C84;
  --pink: #C7497B;
  --pink-light: #FCE9F1;
  --warn-bg: #FFF3DD;
  --warn-border: #E8B463;
  --warn-text: #8B5A00;
  --coupon-bg: #FFF8E7;
  --coupon-border: #F4C857;
  --coupon-text: #B47100;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 12px;
  display: flex;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
}
.outer { width: 100%; max-width: 480px; }
.app {
  background: var(--card);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  display: flex;
  flex-direction: column;
  min-height: 90vh;
}
.header {
  background: var(--line-green);
  color: white;
  padding: 14px 18px 16px;
}
.header-row { display: flex; align-items: center; justify-content: space-between; }
.header-title { font-size: 15px; font-weight: 700; letter-spacing: 0.5px; }
.header-sub { font-size: 12px; opacity: 0.9; margin-top: 2px; }
.progress {
  height: 4px;
  background: rgba(255,255,255,0.3);
  margin-top: 14px;
  border-radius: 2px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  background: white;
  transition: width 0.35s ease;
  width: 0%;
}
.content { padding: 22px 18px 28px; flex: 1; }
.step-label {
  display: inline-block;
  font-size: 11px;
  color: var(--accent);
  background: var(--line-green-light);
  padding: 4px 10px;
  border-radius: 999px;
  font-weight: 700;
  margin-bottom: 10px;
}
.q-title { font-size: 18px; font-weight: 700; line-height: 1.45; margin-bottom: 8px; }
.q-note { font-size: 12px; color: var(--mute); margin-bottom: 18px; }
.options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.option {
  border: 1.5px solid var(--border);
  background: white;
  padding: 13px 14px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 11px;
  transition: all 0.15s;
  user-select: none;
}
.option:active { transform: scale(0.99); }
.option.selected {
  border-color: var(--line-green);
  background: var(--line-green-light);
  font-weight: 600;
}
.option.branch { padding: 16px 14px; border-radius: 12px; }
.option.branch.selected { background: var(--line-green-light); }
.checkbox {
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-radius: 5px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 12px;
  font-weight: 900;
  background: white;
}
.option.selected .checkbox { background: var(--line-green); border-color: var(--line-green); }
.radio {
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-radius: 50%;
  flex-shrink: 0;
  background: white;
  position: relative;
}
.option.selected .radio { border-color: var(--line-green); }
.option.selected .radio::after {
  content: ''; position: absolute;
  width: 10px; height: 10px;
  top: 3px; left: 3px;
  background: var(--line-green);
  border-radius: 50%;
}
.option-text { flex: 1; line-height: 1.4; }
.option-sub { display: block; font-size: 11px; color: var(--mute); margin-top: 3px; font-weight: 400; }
.field-group { margin-bottom: 22px; }
.field-label {
  font-size: 13px;
  color: var(--accent);
  font-weight: 700;
  margin-bottom: 8px;
  display: block;
}
.btn-row { display: flex; gap: 8px; margin-top: 18px; }
.btn {
  flex: 1;
  border: none;
  padding: 14px 18px;
  border-radius: 999px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.18s;
  font-family: inherit;
}
.btn:active { transform: scale(0.98); }
.btn-primary { background: var(--line-green); color: white; }
.btn-primary:disabled { background: #C8E6CC; cursor: not-allowed; opacity: 0.7; }
.btn-secondary { background: #F0F2F4; color: var(--text); flex: 0 0 90px; }
.btn-full { width: 100%; }
.intro-screen { text-align: center; padding: 30px 10px 20px; }
.intro-icon-wrap {
  width: 84px; height: 84px;
  border-radius: 50%;
  background: var(--line-green-light);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  font-size: 40px;
}
.intro-title { font-size: 22px; font-weight: 700; margin-bottom: 14px; }
.intro-desc { font-size: 14px; color: var(--mute); line-height: 1.7; margin-bottom: 26px; }
.required-note {
  background: var(--warn-bg);
  border: 1px solid var(--warn-border);
  color: var(--warn-text);
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 12.5px;
  margin-bottom: 14px;
  font-weight: 600;
}
.booking-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
.booking-tab {
  flex: 1;
  padding: 12px 4px;
  border: 1.5px solid var(--border);
  background: white;
  border-radius: 10px;
  cursor: pointer;
  text-align: center;
  font-size: 13px;
  font-weight: 700;
  transition: all 0.15s;
}
.booking-tab.active { border-color: var(--line-green); background: var(--line-green-light); color: var(--accent); }
.booking-tab-day { display: block; font-size: 10px; color: var(--mute); font-weight: 500; margin-top: 2px; }
.booking-tab.active .booking-tab-day { color: var(--accent); }
.date-picker-wrap {
  margin-bottom: 14px;
  padding: 10px 12px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: white;
}
.date-picker-label { font-size: 12px; color: var(--mute); margin-bottom: 6px; font-weight: 600; }
.date-picker {
  width: 100%;
  padding: 8px 10px;
  font-size: 15px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: inherit;
}
.time-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 14px;
  max-height: 280px;
  overflow-y: auto;
  padding: 2px;
}
.time-slot {
  padding: 11px 4px;
  border: 1.5px solid var(--border);
  background: white;
  border-radius: 8px;
  cursor: pointer;
  text-align: center;
  font-size: 13px;
  font-weight: 700;
  transition: all 0.15s;
}
.time-slot:active { transform: scale(0.97); }
.time-slot.selected { background: var(--line-green); color: white; border-color: var(--line-green); }
.summary-card {
  background: var(--line-green-light);
  border: 1.5px solid var(--line-green);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 14px;
}
.summary-label { font-size: 11px; color: var(--accent); font-weight: 700; }
.summary-value { font-size: 17px; font-weight: 700; color: var(--accent); margin-top: 4px; }
.completion-screen, .end-screen { text-align: center; padding: 24px 10px; }
.complete-icon-wrap {
  width: 84px; height: 84px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 18px;
  font-size: 44px;
}
.complete-icon-wrap.success { background: var(--line-green-light); color: var(--line-green); }
.complete-icon-wrap.end { background: #F0F2F4; color: var(--mute); }
.complete-icon-wrap.error { background: #FCE6E1; color: #C9583F; }
.complete-icon-wrap.coupon { background: var(--coupon-bg); color: var(--coupon-text); }
.complete-title { font-size: 22px; font-weight: 700; margin-bottom: 14px; }
.complete-detail {
  background: var(--line-green-light);
  border-radius: 12px;
  padding: 16px;
  margin: 14px 0;
  text-align: left;
}
.complete-detail-label { font-size: 11px; color: var(--mute); margin-bottom: 4px; }
.complete-detail-value { font-size: 17px; font-weight: 700; color: var(--accent); }
.complete-detail-row { padding: 6px 0; }
.complete-foot { font-size: 13px; color: var(--mute); line-height: 1.6; margin-top: 14px; padding: 0 6px; }
.line-back-link {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 28px;
  background: var(--line-green);
  color: white;
  text-decoration: none;
  border-radius: 999px;
  font-weight: 700;
  font-size: 14px;
}
.coupon-card {
  background: linear-gradient(135deg, #FFF8E7 0%, #FFE9B0 100%);
  border: 2px dashed var(--coupon-border);
  border-radius: 16px;
  padding: 18px 20px;
  margin: 18px 0;
  text-align: center;
}
.coupon-label {
  font-size: 12px;
  color: var(--coupon-text);
  font-weight: 700;
  letter-spacing: 1.5px;
  margin-bottom: 8px;
}
.coupon-amount {
  font-size: 32px;
  font-weight: 900;
  color: var(--coupon-text);
  line-height: 1.1;
  margin-bottom: 6px;
}
.coupon-amount small { font-size: 16px; }
.coupon-name { font-size: 13px; color: var(--coupon-text); font-weight: 600; }
.action-row {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 18px;
}
.action-card {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.action-card:active { transform: scale(0.99); }
.action-card:hover { border-color: var(--line-green); }
.action-icon {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--line-green-light);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 18px;
}
.action-text { flex: 1; }
.action-title { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
.action-desc { font-size: 11.5px; color: var(--mute); line-height: 1.4; }
.bookmark-note {
  background: var(--line-green-light);
  border-radius: 10px;
  padding: 12px 14px;
  margin-top: 14px;
  font-size: 12.5px;
  color: var(--accent);
  line-height: 1.6;
  text-align: left;
}
.loading-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255,255,255,0.85);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.loading-overlay.active { display: flex; }
.spinner {
  width: 48px; height: 48px;
  border: 4px solid #E1E4E8;
  border-top: 4px solid var(--line-green);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="outer">
  <div class="app">
    <div class="header">
      <div class="header-row">
        <div>
          <div class="header-title">カウンセリングシート</div>
          <div class="header-sub" id="header-sub">ご来店前カウンセリング</div>
        </div>
        <div style="font-size:11px; opacity:0.85" id="header-step"></div>
      </div>
      <div class="progress" id="progress-wrap" style="display:none">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
</div>

<script>
// ====================================================================
// 設定
// ====================================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbybPk57whtThzppNyjdIcmQum_-JxtFyqKrtil7CbEoy3xzcsBDUw-bycbpGjLkoBl/exec';
const LINE_OA_BASIC_ID = '@your_oa_id';
const COUPON_AMOUNT = '¥1,000 OFF';
const COUPON_NAME = 'カウンセリング特典クーポン';

// ====================================================================
// 選択肢定義
// ====================================================================
const GENDER_OPTIONS = ['女性', '男性'];
const AGE_OPTIONS = ['10代以下', '20代', '30代', '40代', '50代', '60代以上'];

const HAIR_OPTIONS = [
  'ハリ・コシがない',
  'パサつき・乾燥',
  'ボリュームダウン',
  'うねり・くせ',
  'カラーダメージ',
  '白髪',
  '抜け毛・薄毛',
  'その他',
  '特になし'
];

const NON_HAIR_OPTIONS_FEMALE = [
  '肌・肌荒れ・ニキビ',
  '体型・ダイエット',
  '睡眠・疲れ・ストレス',
  'ホルモン・月経・更年期',
  '栄養・体調・冷え',
  '特になし'
];

const NON_HAIR_OPTIONS_MALE = [
  '肌・肌荒れ・ニキビ',
  '体型・ダイエット',
  '睡眠・疲れ・ストレス',
  '栄養・体調・冷え',
  '特になし'
];

// 髪質(複数選択・共通)
const HAIR_TYPE_OPTIONS = [
  '直毛',
  '軽くウェーブ・くせ毛',
  '強いくせ毛',
  '細い',
  '太い',
  '量が多い',
  '量が少ない',
  'カラーをしている',
  'パーマをしている',
  '白髪あり'
];

// ヘアケア(複数選択)
const HAIR_CARE_OPTIONS = [
  '市販のシャンプー',
  'サロンのシャンプー',
  'トリートメントを月1回以上',
  'ヘアパック・オイル',
  '特にケアしていない'
];

// 食事(複数選択)
const MEAL_OPTIONS = [
  'タンパク質(肉・魚・卵・豆)が不足しがち',
  '鉄分・ミネラルが足りていない気がする',
  '野菜・ビタミンが足りない',
  '外食・コンビニ食が多い',
  '髪に良い食事を意識している',
  '特に気にしていない'
];

// 睡眠(複数選択)
const SLEEP_OPTIONS = [
  '睡眠時間が6時間未満の日が多い',
  '寝つきが悪い・眠りが浅い',
  '夜更かしが多い',
  '夜中に目が覚める',
  'よく眠れている',
  '改善したいけど難しい'
];

const Q_DRUG_OPTIONS = [
  { value: 'positive', label: '積極的に検討したい' },
  { value: 'coupon', label: 'お得なクーポンやキャンペーンがあるなら、試してみたい' },
  { value: 'cheaper', label: '今使っているお薬より安くなるなら試してみたい' },
  { value: 'no', label: '今はまだ大丈夫' }
];

// 髪以外悩み 深掘り2問(各カテゴリ)
const NON_HAIR_DEEP_DIVE = {
  '肌・肌荒れ・ニキビ': [
    { q: '気になる症状は?', options: ['ニキビ・吹き出物', '乾燥', 'くすみ・シミ', 'たるみ'] },
    { q: '気になる部位は?', options: ['顔全体', 'Tゾーン', 'Uゾーン(あご周り)', 'フェイスライン'] }
  ],
  '体型・ダイエット': [
    { q: '気になるパーツは?', options: ['お腹周り', '下半身', '二の腕', '全体的に'] },
    { q: 'これまで試したことは?', options: ['食事制限', '運動', 'サプリ', '何もしていない'] }
  ],
  '睡眠・疲れ・ストレス': [
    { q: '気になる症状は?', options: ['寝つきが悪い', '眠りが浅い', '朝起きられない', '疲れがとれない'] },
    { q: '気になる期間は?', options: ['最近(数週間)', '数ヶ月', '数年', '常に'] }
  ],
  'ホルモン・月経・更年期': [
    { q: '気になる症状は?', options: ['PMS(月経前症候群)', '月経痛', '月経不順', '更年期症状'] },
    { q: '日常への影響度は?', options: ['日常に支障あり', '時々困る', '気になる程度', '我慢している'] }
  ],
  '栄養・体調・冷え': [
    { q: '気になる症状は?', options: ['冷え', '疲れやすい', '貧血気味', '便秘・むくみ'] },
    { q: '気になる期間は?', options: ['最近(数週間)', '数ヶ月', '年単位', '体質だと思っている'] }
  ]
};

// ====================================================================
// state
// ====================================================================
function getUidFromUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get('uid') || params.get('user_id') || '';
}

function getSessionId() {
  let sid = sessionStorage.getItem('shareclinic_sid');
  if (!sid) {
    sid = 'sid_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    sessionStorage.setItem('shareclinic_sid', sid);
  }
  return sid;
}

let state = {
  screen: 'intro',
  uid: getUidFromUrl(),
  sessionId: getSessionId(),
  startedAt: new Date().toISOString(),
  answers: {
    gender: null,           // 性別 単一
    age: null,              // 年代 単一
    hairConcerns: [],       // 髪悩み 複数
    nonHairConcerns: [],    // 髪以外悩み 複数
    drugIntent: null,       // お薬意向 単一
    hairType: [],           // 髪質 複数
    hairCare: [],           // ヘアケア 複数
    meal: [],               // 食事 複数
    sleep: [],              // 睡眠 複数
    nonHairFocus: null,     // 髪以外で一番気になる 単一
    nonHairDeep: [],        // 深掘り2問の答え [a1, a2]
    finalBranch: null       // 最終分岐
  },
  bookingDateType: 'today',
  bookingOtherDate: '',
  bookingSlot: null,
  bookingTrigger: null
};

const $content = document.getElementById('content');
const $progressWrap = document.getElementById('progress-wrap');
const $progressBar = document.getElementById('progress-bar');
const $headerSub = document.getElementById('header-sub');
const $headerStep = document.getElementById('header-step');
const $loading = document.getElementById('loading-overlay');

// ====================================================================
// 離脱計測 — 各画面表示時にGASに ping
// ====================================================================
function logStepView(stepId, stepLabel) {
  const payload = {
    type: 'step_view',
    sessionId: state.sessionId,
    uid: state.uid,
    step: stepId,
    label: stepLabel,
    timestamp: new Date().toISOString()
  };
  try {
    fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    }).catch(() => {});
  } catch (e) {}
}

// ====================================================================
// プログレス計算
// ====================================================================
function getStepProgress() {
  // 概算: フローを11ステップとして計算
  const order = ['intro','profile','hair','non_hair','drug','hair_type','hair_care','meal','sleep','non_hair_focus','non_hair_deep','final_branch','booking'];
  const idx = order.indexOf(state.screen);
  if (idx < 0) return { current: 0, total: 11 };
  return { current: Math.max(1, idx), total: 11 };
}

function updateProgress() {
  if (['intro','completion','end','error','coupon_end'].includes(state.screen)) {
    $progressWrap.style.display = 'none';
    $headerStep.textContent = '';
    return;
  }
  $progressWrap.style.display = 'block';
  const p = getStepProgress();
  $progressBar.style.width = Math.min(100, (p.current / p.total) * 100) + '%';
  $headerStep.textContent = '';
}

function getNonHairOptions() {
  return state.answers.gender === '男性' ? NON_HAIR_OPTIONS_MALE : NON_HAIR_OPTIONS_FEMALE;
}

// ====================================================================
// 画面: intro
// ====================================================================
function renderIntro() {
  $headerSub.textContent = 'ご来店前カウンセリング';
  logStepView('intro', 'イントロ');
  $content.innerHTML = `
    <div class="intro-screen">
      <div class="intro-icon-wrap">📋</div>
      <div class="intro-title">カウンセリングシート</div>
      <div class="intro-desc">
        本日のカウンセリングを<br>
        スムーズに進めるため、<br>
        簡単なご記入にご協力ください。<br><br>
        所要時間：約2分
      </div>
      <button class="btn btn-primary btn-full" onclick="goToProfile()">記入を始める</button>
    </div>
  `;
  updateProgress();
}

function goToProfile() { state.screen = 'profile'; render(); }

// ====================================================================
// Step1: 性別 + 年代
// ====================================================================
function renderProfile() {
  $headerSub.textContent = 'あなたについて';
  logStepView('profile', '性別年代');
  let html = `<div>
    <div class="step-label">あなたについて</div>
    <div class="q-title">かんたんなプロフィールをお聞かせください</div>
    <div class="q-note">アンケート内容を最適化するため使用します</div>

// ====================================================================
// 予約画面
// ====================================================================
function generateTimeSlots(isToday) {
  const slots = [];
  const startH = isToday ? Math.max(new Date().getHours() + 1, 10) : 10;
  const endH = 21;
  for (let h = startH; h <= endH; h++) {
    slots.push(pad(h) + ':00');
    if (h < endH) slots.push(pad(h) + ':30');
  }
  return slots;
}

function pad(n) { return n < 10 ? '0' + n : '' + n; }

function getDateForType(type) {
  const today = new Date();
  if (type === 'today') return today;
  if (type === 'tomorrow') {
    const t = new Date(today);
    t.setDate(t.getDate() + 1);
    return t;
  }
  if (type === 'other' && state.bookingOtherDate) {
    return new Date(state.bookingOtherDate);
  }
  return today;
}

function renderBooking() {
  $headerSub.textContent = '5分のオンラインカウンセリング 予約';
  logStepView('booking', '予約画面');
  const today = new Date();
  const tomorrow = new Date(today);
  tomorrow.setDate(tomorrow.getDate() + 1);
  const wd = ['日','月','火','水','木','金','土'];
  const fmt = (d) => `${d.getMonth() + 1}/${d.getDate()} (${wd[d.getDay()]})`;
  const todayLabel = fmt(today);
  const tomorrowLabel = fmt(tomorrow);

  const dateType = state.bookingDateType;
  const isToday = dateType === 'today';
  const isOther = dateType === 'other';
  const slots = isOther ? generateTimeSlots(false) : generateTimeSlots(isToday);

  const minOther = new Date(today);
  minOther.setDate(minOther.getDate() + 2);
  const minOtherStr = minOther.toISOString().slice(0, 10);

  // 来訪トリガーで文言を出し分け
  const isFromDrug = state.bookingTrigger && String(state.bookingTrigger).indexOf('drug_') === 0;
  const noteText = isFromDrug
    ? 'サロン提携のカウンセラーがお話を伺います'
    : 'サロン提携のカウンセラーが、あなたに合うケアや生活習慣をご提案します';

  let html = `<div>
    <div class="step-label">5分のオンラインカウンセリング</div>
    <div class="q-title">日時を選択してください</div>
    <div class="q-note">${escapeHtml(noteText)}</div>
    <div class="required-note">★ 当日中の予約が最もおすすめです</div>
    <div class="booking-tabs">
      <div class="booking-tab ${isToday ? 'active' : ''}" onclick="selectDateType('today')">
        当日 <span class="booking-tab-day">${todayLabel}</span>
      </div>
      <div class="booking-tab ${dateType === 'tomorrow' ? 'active' : ''}" onclick="selectDateType('tomorrow')">
        翌日 <span class="booking-tab-day">${tomorrowLabel}</span>
      </div>
      <div class="booking-tab ${isOther ? 'active' : ''}" onclick="selectDateType('other')">
        別日
      </div>
    </div>`;

  if (isOther) {
    html += `<div class="date-picker-wrap">
      <div class="date-picker-label">日付を選択</div>
      <input type="date" class="date-picker" min="${minOtherStr}" value="${state.bookingOtherDate || ''}" onchange="setBookingOtherDate(this.value)">
    </div>`;
  }

  if (!isOther || state.bookingOtherDate) {
    html += `<div class="time-grid">`;
    slots.forEach(slot => {
      const sel = state.bookingSlot === slot ? 'selected' : '';
      html += `<div class="time-slot ${sel}" onclick="selectSlot('${slot}')">${slot}</div>`;
    });
    html += `</div>`;
  }

  if (state.bookingSlot) {
    const d = getDateForType(dateType);
    html += `<div class="summary-card">
      <div class="summary-label">選択中の予約枠</div>
      <div class="summary-value">${fmt(d)} ${state.bookingSlot}〜</div>
    </div>`;
  }

  html += `<div class="btn-row">
    <button class="btn btn-secondary" onclick="goBackFromBooking()">戻る</button>
    <button class="btn btn-primary" onclick="confirmBooking()" ${state.bookingSlot ? '' : 'disabled'}>この日時で予約を確定する</button>
  </div></div>`;
  $content.innerHTML = html;
  updateProgress();
}

function selectDateType(t) {
  state.bookingDateType = t;
  state.bookingSlot = null;
  if (t !== 'other') state.bookingOtherDate = '';
  render();
}

function setBookingOtherDate(val) {
  state.bookingOtherDate = val;
  state.bookingSlot = null;
  render();
}

function selectSlot(slot) {
  state.bookingSlot = slot;
  render();
}

function goBackFromBooking() {
  const trigger = state.bookingTrigger;
  if (trigger === 'final_branch') {
    state.screen = 'final_branch';
  } else if (trigger === 'from_bookmark') {
    state.screen = 'coupon_end';
  } else if (trigger === 'from_coupon') {
    state.screen = 'coupon_end';
  } else {
    state.screen = 'drug';
  }
  render();
}

async function confirmBooking() {
  const ok = await submitAnswers();
  if (ok) {
    state.screen = 'completion';
    render();
  }
}

// ====================================================================
// データ送信
// ====================================================================
async function submitAnswers() {
  $loading.classList.add('active');
  const payload = {
    type: 'final_submit',
    sessionId: state.sessionId,
    uid: state.uid,
    startedAt: state.startedAt,
    submittedAt: new Date().toISOString(),
    gender: state.answers.gender || '',
    age: state.answers.age || '',
    hairConcerns: (state.answers.hairConcerns || []).join('|'),
    nonHairConcerns: (state.answers.nonHairConcerns || []).join('|'),
    drugIntent: state.answers.drugIntent || '',
    hairType: (state.answers.hairType || []).join('|'),
    hairCare: (state.answers.hairCare || []).join('|'),
    meal: (state.answers.meal || []).join('|'),
    sleep: (state.answers.sleep || []).join('|'),
    nonHairFocus: state.answers.nonHairFocus || '',
    nonHairDeep1: (state.answers.nonHairDeep && state.answers.nonHairDeep[0]) || '',
    nonHairDeep2: (state.answers.nonHairDeep && state.answers.nonHairDeep[1]) || '',
    finalBranch: state.answers.finalBranch || '',
    bookingTrigger: state.bookingTrigger || '',
    bookingDateType: state.bookingDateType || '',
    bookingOtherDate: state.bookingOtherDate || '',
    bookingSlot: state.bookingSlot || '',
    userAgent: navigator.userAgent
  };

  try {
    await fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    $loading.classList.remove('active');
    return true;
  } catch (e) {
    $loading.classList.remove('active');
    state.screen = 'error';
    render();
    return false;
  }
}

// ====================================================================
// 予約完了
// ====================================================================
function renderCompletion() {
  $headerSub.textContent = '予約完了';
  logStepView('completion', '予約完了');
  const d = getDateForType(state.bookingDateType);
  const wd = ['日','月','火','水','木','金','土'];
  const fmt = (d) => `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日 (${wd[d.getDay()]})`;
  $content.innerHTML = `
    <div class="completion-screen">
      <div class="complete-icon-wrap success">✓</div>
      <div class="complete-title">予約を受け付けました</div>
      <div class="complete-detail">
        <div class="complete-detail-row">
          <div class="complete-detail-label">予約日時</div>
          <div class="complete-detail-value">${fmt(d)}</div>
          <div class="complete-detail-value">${state.bookingSlot}〜 (5分)</div>
        </div>
      </div>
      <div class="complete-foot">
        ご予約ありがとうございます。<br>
        確認メッセージをLINEでお送りします。<br>
        お時間になりましたら、カウンセラーから<br>
        ご連絡いたします。
      </div>
      <a href="https://line.me/R/oaMessage/${LINE_OA_BASIC_ID}/" class="line-back-link">LINEに戻る</a>
    </div>
  `;
  updateProgress();
}

// ====================================================================
// クーポン終了画面
// ====================================================================
function renderCouponEnd() {
  $headerSub.textContent = 'ご回答ありがとうございました';
  logStepView('coupon_end', 'クーポン画面');
  $content.innerHTML = `
    <div class="end-screen">
      <div class="complete-icon-wrap coupon">🎁</div>
      <div class="complete-title">ご回答ありがとうございました</div>
      <div class="coupon-card">
        <div class="coupon-label">★ アンケート回答特典 ★</div>
        <div class="coupon-amount">${escapeHtml(COUPON_AMOUNT)}</div>
        <div class="coupon-name">${escapeHtml(COUPON_NAME)}</div>
      </div>
      <div class="complete-foot" style="text-align:left;">
        次のご来店時、店員さんに<br>
        <strong style="color:var(--accent)">「カウンセリング回答済み」</strong><br>
        とお声がけください。
      </div>
      <div class="action-row">
        <div class="action-card" onclick="tryBookmark()">
          <div class="action-icon">🔖</div>
          <div class="action-text">
            <div class="action-title">このページをブックマーク</div>
            <div class="action-desc">後で気になったらいつでも予約できます</div>
          </div>
        </div>
        <div class="action-card" onclick="goToBookingFromCoupon()">
          <div class="action-icon">📅</div>
          <div class="action-text">
            <div class="action-title">気が変わった方はこちら</div>
            <div class="action-desc">5分のオンラインカウンセリングを今すぐ予約</div>
          </div>
        </div>
      </div>
      <div class="bookmark-note">
        💡 ブックマークしておくと、お困りの際にいつでも提携カウンセラーへご相談できます
      </div>
      <a href="https://line.me/R/oaMessage/${LINE_OA_BASIC_ID}/" class="line-back-link">LINEに戻る</a>
    </div>
  `;
  updateProgress();
}

function tryBookmark() {
  alert('画面右上のメニューから「ブックマーク」「お気に入りに追加」を選んでください。\n\n後でこのページを開くと、いつでも予約画面にアクセスできます。');
}

function goToBookingFromCoupon() {
  state.bookingTrigger = 'from_coupon';
  state.screen = 'booking';
  state.bookingSlot = null;
  render();
}

// ====================================================================
// エラー
// ====================================================================
function renderError() {
  $headerSub.textContent = '送信エラー';
  logStepView('error', 'エラー');
  $content.innerHTML = `
    <div class="end-screen">
      <div class="complete-icon-wrap error">!</div>
      <div class="complete-title">送信に失敗しました</div>
      <div class="complete-foot">
        通信状態をご確認のうえ、もう一度お試しください。
      </div>
      <button class="btn btn-primary btn-full" style="margin-top:20px;max-width:240px" onclick="location.reload()">最初に戻る</button>
    </div>
  `;
  updateProgress();
}

// ====================================================================
// 戻る
// ====================================================================
function goBackToIntro() { state.screen = 'intro'; render(); }
function goBack(target) { state.screen = target; render(); }

// ====================================================================
// utility
// ====================================================================
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) {
  return String(s).replace(/[&<>"'\\]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'\\\'','\\':'\\\\'}[c]));
}

// ====================================================================
// 離脱トラッキング
// ====================================================================
window.addEventListener('beforeunload', function() {
  if (['completion','coupon_end','error'].includes(state.screen)) return;
  const payload = {
    type: 'exit',
    sessionId: state.sessionId,
    uid: state.uid,
    step: state.screen,
    timestamp: new Date().toISOString()
  };
  if (navigator.sendBeacon) {
    navigator.sendBeacon(GAS_URL, JSON.stringify(payload));
  }
});

// ====================================================================
// メインルーター
// ====================================================================
function render() {
  if (state.screen === 'intro') renderIntro();
  else if (state.screen === 'profile') renderProfile();
  else if (state.screen === 'hair') renderHair();
  else if (state.screen === 'non_hair') renderNonHair();
  else if (state.screen === 'drug') renderDrug();
  else if (state.screen === 'hair_type') renderHairType();
  else if (state.screen === 'hair_care') renderHairCare();
  else if (state.screen === 'meal') renderMeal();
  else if (state.screen === 'sleep') renderSleep();
  else if (state.screen === 'non_hair_focus') renderNonHairFocus();
  else if (state.screen === 'non_hair_deep') renderNonHairDeep();
  else if (state.screen === 'final_branch') renderFinalBranch();
  else if (state.screen === 'booking') renderBooking();
  else if (state.screen === 'completion') renderCompletion();
  else if (state.screen === 'coupon_end') renderCouponEnd();
  else if (state.screen === 'error') renderError();
}

if (window.location.hash === '#book') {
  state.bookingTrigger = 'from_bookmark';
  state.screen = 'booking';
}

render();
</script>
</body>
</html>
